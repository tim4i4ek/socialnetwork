{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CHILL{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'loginstyle.css' %}">
    <style>
        /* Спільні стилі для всього сайту */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f9f9f9; color: #333; }
        .main-header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #eee; z-index: 1000; display: flex; align-items: center; }
        .header-container { max-width: 1100px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo a { font-size: 22px; font-weight: 900; color: #1a1a1a; text-decoration: none; letter-spacing: 1.5px; }
        .nav-links { display: flex; gap: 25px; }
        .nav-item { text-decoration: none; color: #666; font-size: 14px; font-weight: 500; transition: 0.3s; }
        .nav-item:hover { color: #000; }
        .btn-header { background: #1a1a1a; color: #fff; padding: 8px 18px; border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 600; }
        .header-spacer { height: 90px; }
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <div class="logo"><a href="/">CHILL</a></div>
        <nav class="nav-links">
            <a href="/" class="nav-item">Стрічка</a>
            <a href="#" class="nav-item">Популярне</a>
            <a href="#" class="nav-item">Спільноти</a>
            <a href="#" class="nav-item">Про нас</a>
        </nav>
        <div class="auth-buttons">
            {% if user.is_authenticated %}
                <a href="#" class="nav-item" style="margin-right: 15px;">Привіт, {{ user.username }}</a>
                <a href="{% url 'logout' %}" class="btn-header" style="background: #e74c3c;">Вийти</a>
            {% else %}
                <a href="{% url 'login' %}" class="nav-item" style="margin-right: 15px;">Увійти</a>
                <a href="{% url 'register' %}" class="btn-header">Приєднатися</a>
            {% endif %}
        </div>
    </div>
</header>

<div class="header-spacer"></div>

{% block content %}
<!-- Тут буде контент кожної сторінки -->
{% endblock %}

</body>
</html>
